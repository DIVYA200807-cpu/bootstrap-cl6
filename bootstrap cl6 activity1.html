<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="container mt-4">
        <h2>carousal example</h2>
        <div id="mycarousal" class="carousal slide" data-bs-ride="carousal">
            <div class="carousal-indicators">
                <button type="button" data-bs-target="#mycarousal" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#mycarousal" data-bs-slide-to="1" class="active"></button>
                <button type="button" data-bs-target="#mycarousal" data-bs-slide-to="2" class="active"></button>

            </div>
            <div class="carousal-inner">
                <div class="carousal-item active">
                    <img src="img1.jfif" class="d-block w-100" alt="img1">

                </div>
                <div class="carousal-item">
                    <img src="img2.jfif" class="d-block w-100" alt="img2">
                
                </div>
                <div class="carousal-item">
                    <img src="img3.jfif" class="d-block w-100" alt="img3">
                
                </div>
                <button class="carousal-control-prev" type="button" data-bs-target="#mycarousal" data-bs-slide="prev">
                    <span class="carousal-control-prev-icon"></span>

                </button>
                <button class="carousal-control-next" type="button" data-bs-target="#mycarousal" data-bs-slide="next">
                    <span class="carousal-control-next-icon"></span>

                </button>

            </div>

        </div>

    </div>
</body>
</html>
